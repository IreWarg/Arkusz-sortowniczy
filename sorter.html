<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sorter Poziomów Cenowych</title>

<style>

/* =========================
   WYGLĄD STRONY
========================= */

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
    color:#222;
}

/* =========================
   TYTUŁ
========================= */

h1{
    margin-bottom:10px;
}

/* =========================
   OKNO WKLEJANIA DANYCH
========================= */

textarea{
    width:100%;
    height:220px;
    padding:10px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:vertical;
    background:white;
}

/* =========================
   PRZYCISKI
========================= */

.buttons{
    margin-top:15px;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    background:#1976d2;
    color:white;
}

button:hover{
    opacity:0.9;
}

/* =========================
   SEKCJE WYNIKÓW
========================= */

.section{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:25px;
    overflow:auto;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* =========================
   TABELA
========================= */

table{
    border-collapse:collapse;
    width:100%;
    min-width:900px;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
    font-size:14px;
}

th{
    background:#f0f0f0;
}

/* =========================
   KOLORY DUBLI
========================= */

.double{
    background:#fff59d;
}

.triple{
    background:#ffcc80;
}

.quad{
    background:#ef9a9a;
}

.many{
    background:#ce93d8;
}

/* =========================
   STATYSTYKI
========================= */

.stats{
    margin-top:10px;
    font-size:14px;
}

</style>

</head>

<body>

<h1>Sorter Poziomów Cenowych</h1>

<p>
Wklej dane w formacie:
</p>

<pre>
2025.07.28    0.89496
2022.09.01    0.89496
2020.02.12    0.76549
</pre>

<!-- =========================
     OKNO DANYCH
========================= -->

<textarea id="inputData" placeholder="Wklej dane tutaj..."></textarea>

<!-- =========================
     PRZYCISKI
========================= -->

<div class="buttons">

    <!-- SORTOWANIE -->
    <button onclick="sortLevels()">
        Sortuj od najmniejszej do największej
    </button>

    <!-- DUBLE -->
    <button onclick="showDuplicates()">
        Pokaż zdublowane poziomy
    </button>

    <!-- ANALIZA RÓŻNIC -->
    <button onclick="analyzeDifferences()">
        Analiza różnic
    </button>

    <!-- KOPIOWANIE -->
    <button onclick="copyResults()">
        Kopiuj wynik
    </button>

</div>

<!-- =========================
     STATYSTYKI
========================= -->

<div class="stats" id="stats"></div>

<!-- =========================
     WYNIKI
========================= -->

<div id="results"></div>

<script>

/* =====================================================
   WCZYTYWANIE DANYCH
===================================================== */

function parseInput(){

    const raw = document.getElementById("inputData").value.trim();

    if(!raw){

        alert("Wklej dane.");
        return [];
    }

    const lines = raw.split("\n");

    const data = [];

    for(let line of lines){

        line = line.trim();

        if(!line) continue;

        const parts = line.split(/\s+/);

        if(parts.length < 2) continue;

        const date = parts[0];

        const levelRaw = parts[1];

        // Zamiana przecinka na kropkę

        const normalized = levelRaw.replace(",", ".");

        const levelNumber = Number(normalized);

        if(isNaN(levelNumber)) continue;

        data.push({

            date: date,

            levelRaw: levelRaw,

            levelNormalized: normalized,

            levelNumber: levelNumber
        });
    }

    return data;
}

/* =====================================================
   STATYSTYKI
===================================================== */

function updateStats(total, unique, duplicates){

    document.getElementById("stats").innerHTML = `
        <b>Wiersze wejściowe:</b> ${total}
        &nbsp;&nbsp; | &nbsp;&nbsp;
        <b>Unikalne poziomy:</b> ${unique}
        &nbsp;&nbsp; | &nbsp;&nbsp;
        <b>Poziomy zdublowane:</b> ${duplicates}
    `;
}

/* =====================================================
   SORTOWANIE
===================================================== */

function sortLevels(){

    const data = parseInput();

    if(data.length === 0) return;

    const sorted = [...data].sort(
        (a,b)=>a.levelNumber - b.levelNumber
    );

    let html = `

    <div class="section">

        <h2>Wynik sortowania</h2>

        <table>

            <thead>
                <tr>
                    <th>Data</th>
                    <th>Poziom</th>
                    <th>Różnica</th>
                </tr>
            </thead>

            <tbody>
    `;

    for(let i = 0; i < sorted.length; i++){

        const row = sorted[i];

        let difference = "---";

        if(i > 0){

            const previous = sorted[i - 1];

            difference = (
                row.levelNumber - previous.levelNumber
            ).toFixed(5);
        }

        html += `
            <tr>
                <td>${row.date}</td>
                <td>${row.levelRaw}</td>
                <td>${difference}</td>
            </tr>
        `;
    }

    html += `
            </tbody>
        </table>

    </div>
    `;

    document.getElementById("results").innerHTML = html;

    const unique = new Set(
        sorted.map(x=>x.levelNormalized)
    ).size;

    updateStats(
        sorted.length,
        unique,
        sorted.length - unique
    );
}

/* =====================================================
   DUBLE / TRIPLE / CZWORAKI+
===================================================== */

function showDuplicates(){

    const data = parseInput();

    if(data.length === 0) return;

    const map = {};

    for(const row of data){

        const key = row.levelNormalized;

        if(!map[key]){

            map[key] = {

                level: row.levelRaw,

                dates: []
            };
        }

        map[key].dates.push(row.date);
    }

    const duplicates = [];

    for(const key in map){

        if(map[key].dates.length >= 2){

            duplicates.push({

                level: map[key].level,

                count: map[key].dates.length,

                dates: map[key].dates,

                numeric: Number(key)
            });
        }
    }

    duplicates.sort(
        (a,b)=>a.numeric - b.numeric
    );

    let maxDates = 0;

    duplicates.forEach(x=>{

        if(x.dates.length > maxDates){

            maxDates = x.dates.length;
        }
    });

    let html = `

    <div class="section">

        <h2>Zdublowane poziomy</h2>

        <table>

            <thead>
                <tr>

                    <th>Poziom</th>
                    <th>Ilość</th>
    `;

    for(let i=1; i<=maxDates; i++){

        html += `<th>Data ${i}</th>`;
    }

    html += `
                </tr>
            </thead>

            <tbody>
    `;

    for(const row of duplicates){

        let rowClass = "";

        if(row.count === 2){

            rowClass = "double";
        }
        else if(row.count === 3){

            rowClass = "triple";
        }
        else if(row.count === 4){

            rowClass = "quad";
        }
        else{

            rowClass = "many";
        }

        html += `<tr class="${rowClass}">`;

        html += `
            <td>${row.level}</td>
            <td>${row.count}</td>
        `;

        for(let i=0; i<maxDates; i++){

            html += `<td>${row.dates[i] || ""}</td>`;
        }

        html += `</tr>`;
    }

    html += `
            </tbody>
        </table>

    </div>
    `;

    document.getElementById("results").innerHTML = html;

    const unique = new Set(
        data.map(x=>x.levelNormalized)
    ).size;

    updateStats(
        data.length,
        unique,
        data.length - unique
    );
}

/* =====================================================
   ANALIZA RÓŻNIC
===================================================== */

function analyzeDifferences(){

    const data = parseInput();

    if(data.length === 0) return;

    // Sortowanie poziomów

    const sorted = [...data].sort(
        (a,b)=>a.levelNumber - b.levelNumber
    );

    // Obiekt częstotliwości

    const frequencyMap = {};

    // Liczenie różnic

    for(let i = 1; i < sorted.length; i++){

        const current = sorted[i].levelNumber;

        const previous = sorted[i - 1].levelNumber;

        // Różnica

        const difference = (
            current - previous
        ).toFixed(5);

        // Liczenie wystąpień

        if(!frequencyMap[difference]){

            frequencyMap[difference] = 0;
        }

        frequencyMap[difference]++;
    }

    // Zamiana na tablicę

    const frequencyArray = [];

    for(const key in frequencyMap){

        frequencyArray.push({

            difference: key,

            count: frequencyMap[key]
        });
    }

    // Sortowanie po częstotliwości

    frequencyArray.sort(
        (a,b)=>b.count - a.count
    );

    // Budowa tabeli

    let html = `

    <div class="section">

        <h2>Analiza różnic</h2>

        <table>

            <thead>
                <tr>
                    <th>Różnica</th>
                    <th>Częstotliwość</th>
                </tr>
            </thead>

            <tbody>
    `;

    for(const row of frequencyArray){

        html += `
            <tr>
                <td>${row.difference}</td>
                <td>${row.count}</td>
            </tr>
        `;
    }

    html += `
            </tbody>
        </table>

    </div>
    `;

    document.getElementById("results").innerHTML = html;

    const unique = new Set(
        data.map(x=>x.levelNormalized)
    ).size;

    updateStats(
        data.length,
        unique,
        data.length - unique
    );
}

/* =====================================================
   KOPIOWANIE WYNIKU
===================================================== */

function copyResults(){

    const results = document.getElementById("results");

    if(!results.innerText.trim()){

        alert("Brak wyników do skopiowania.");
        return;
    }

    navigator.clipboard.writeText(results.innerText)

        .then(() => {

            alert("Wynik skopiowany.");
        })

        .catch(() => {

            alert("Nie udało się skopiować.");
        });
}

</script>

</body>

</html>
