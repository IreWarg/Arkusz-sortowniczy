<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sorter Poziomów Cenowych</title>

<style>

/* =========================
   WYGLĄD CAŁEJ STRONY
========================= */

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
    color:#222;
}

/* =========================
   TYTUŁ
========================= */

h1{
    margin-bottom:10px;
}

/* =========================
   OKNO DO WKLEJANIA DANYCH
========================= */

textarea{
    width:100%;
    height:220px;
    padding:10px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:vertical;
    background:white;
}

/* =========================
   SEKCJA PRZYCISKÓW
========================= */

.buttons{
    margin-top:15px;
    margin-bottom:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

/* =========================
   WYGLĄD PRZYCISKÓW
========================= */

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    background:#1976d2;
    color:white;
}

button:hover{
    opacity:0.9;
}

/* =========================
   SEKCJA WYNIKÓW
========================= */

.section{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:25px;
    overflow:auto;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* =========================
   TABELA
========================= */

table{
    border-collapse:collapse;
    width:100%;
    min-width:700px;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
    font-size:14px;
}

th{
    background:#f0f0f0;
}

/* =========================
   KOLORY DUBLI / TRIPLI
========================= */

.double{
    background:#fff59d;
}

.triple{
    background:#ffcc80;
}

.quad{
    background:#ef9a9a;
}

.many{
    background:#ce93d8;
}

/* =========================
   STATYSTYKI
========================= */

.stats{
    margin-top:10px;
    font-size:14px;
}

</style>

</head>

<body>

<h1>Sorter Poziomów Cenowych</h1>

<p>
Wklej dane w formacie:
</p>

<pre>
2025.07.28    0.89496
2022.09.01    0.89496
2020.02.12    0.76549
</pre>

<!-- =========================
     OKNO DO WKLEJANIA DANYCH
========================= -->

<textarea id="inputData" placeholder="Wklej dane tutaj..."></textarea>

<!-- =========================
     PRZYCISKI
========================= -->

<div class="buttons">

    <!-- SORTOWANIE -->
    <button onclick="sortLevels()">
        Sortuj od najmniejszej do największej
    </button>

    <!-- DUBLE / TRIPLE -->
    <button onclick="showDuplicates()">
        Pokaż zdublowane poziomy
    </button>

    <!-- KOPIOWANIE -->
    <button onclick="copyResults()">
        Kopiuj wynik
    </button>

</div>

<!-- =========================
     STATYSTYKI
========================= -->

<div class="stats" id="stats"></div>

<!-- =========================
     WYNIKI
========================= -->

<div id="results"></div>

<script>

/* =====================================================
   FUNKCJA:
   WCZYTANIE I PRZYGOTOWANIE DANYCH
===================================================== */

function parseInput(){

    // Pobranie tekstu z okna

    const raw = document.getElementById("inputData").value.trim();

    // Jeśli brak danych

    if(!raw){

        alert("Wklej dane.");
        return [];
    }

    // Podział na linie

    const lines = raw.split("\n");

    // Tablica wynikowa

    const data = [];

    // Analiza każdej linii

    for(let line of lines){

        line = line.trim();

        if(!line) continue;

        // Rozdzielenie daty i poziomu

        const parts = line.split(/\s+/);

        if(parts.length < 2) continue;

        const date = parts[0];

        const levelRaw = parts[1];

        // Zamiana przecinka na kropkę

        const normalized = levelRaw.replace(",", ".");

        // Zamiana na liczbę

        const levelNumber = Number(normalized);

        // Jeśli nie jest liczbą

        if(isNaN(levelNumber)) continue;

        // Dodanie do tablicy

        data.push({

            date: date,

            // Oryginalny zapis poziomu
            levelRaw: levelRaw,

            // Wersja znormalizowana
            levelNormalized: normalized,

            // Liczba do sortowania
            levelNumber: levelNumber
        });
    }

    return data;
}

/* =====================================================
   FUNKCJA:
   AKTUALIZACJA STATYSTYK
===================================================== */

function updateStats(total, unique, duplicates){

    document.getElementById("stats").innerHTML = `
        <b>Wiersze wejściowe:</b> ${total}
        &nbsp;&nbsp; | &nbsp;&nbsp;
        <b>Unikalne poziomy:</b> ${unique}
        &nbsp;&nbsp; | &nbsp;&nbsp;
        <b>Poziomy zdublowane:</b> ${duplicates}
    `;
}

/* =====================================================
   FUNKCJA:
   SORTOWANIE OD NAJMNIEJSZEJ DO NAJWIĘKSZEJ
===================================================== */

function sortLevels(){

    // Pobranie danych

    const data = parseInput();

    if(data.length === 0) return;

    // Sortowanie numeryczne

    const sorted = [...data].sort(
        (a,b)=>a.levelNumber - b.levelNumber
    );

    // Budowa tabeli HTML

    let html = `

    <div class="section">

        <h2>Wynik sortowania</h2>

        <table>

            <thead>
                <tr>
                    <th>Data</th>
                    <th>Poziom</th>
                </tr>
            </thead>

            <tbody>
    `;

    // Dodawanie wierszy

    for(const row of sorted){

        html += `
            <tr>
                <td>${row.date}</td>
                <td>${row.levelRaw}</td>
            </tr>
        `;
    }

    html += `
            </tbody>
        </table>

    </div>
    `;

    // Wyświetlenie wyników

    document.getElementById("results").innerHTML = html;

    // Liczenie unikalnych poziomów

    const unique = new Set(
        sorted.map(x=>x.levelNormalized)
    ).size;

    // Aktualizacja statystyk

    updateStats(
        sorted.length,
        unique,
        sorted.length - unique
    );
}

/* =====================================================
   FUNKCJA:
   POKAZYWANIE DUBLI / TRIPLI / CZWORAKÓW+
===================================================== */

function showDuplicates(){

    // Pobranie danych

    const data = parseInput();

    if(data.length === 0) return;

    // Obiekt grupujący poziomy

    const map = {};

    // Grupowanie danych

    for(const row of data){

        const key = row.levelNormalized;

        // Jeśli poziomu jeszcze nie ma

        if(!map[key]){

            map[key] = {

                level: row.levelRaw,

                dates: []
            };
        }

        // Dodanie daty

        map[key].dates.push(row.date);
    }

    // Tablica wynikowa

    const duplicates = [];

    // Szukanie poziomów >= 2

    for(const key in map){

        if(map[key].dates.length >= 2){

            duplicates.push({

                level: map[key].level,

                count: map[key].dates.length,

                dates: map[key].dates,

                numeric: Number(key)
            });
        }
    }

    // Sortowanie wyników

    duplicates.sort(
        (a,b)=>a.numeric - b.numeric
    );

    // Szukanie maksymalnej liczby dat

    let maxDates = 0;

    duplicates.forEach(x=>{

        if(x.dates.length > maxDates){

            maxDates = x.dates.length;
        }
    });

    // Budowa tabeli

    let html = `

    <div class="section">

        <h2>Zdublowane poziomy</h2>

        <table>

            <thead>
                <tr>

                    <th>Poziom</th>
                    <th>Ilość</th>
    `;

    // Dynamiczne kolumny dat

    for(let i=1; i<=maxDates; i++){

        html += `<th>Data ${i}</th>`;
    }

    html += `
                </tr>
            </thead>

            <tbody>
    `;

    // Dodawanie wierszy

    for(const row of duplicates){

        let rowClass = "";

        // Kolory zależne od ilości

        if(row.count === 2){

            rowClass = "double";
        }
        else if(row.count === 3){

            rowClass = "triple";
        }
        else if(row.count === 4){

            rowClass = "quad";
        }
        else{

            rowClass = "many";
        }

        html += `<tr class="${rowClass}">`;

        html += `
            <td>${row.level}</td>
            <td>${row.count}</td>
        `;

        // Dodawanie dat

        for(let i=0; i<maxDates; i++){

            html += `<td>${row.dates[i] || ""}</td>`;
        }

        html += `</tr>`;
    }

    html += `
            </tbody>
        </table>

    </div>
    `;

    // Wyświetlenie tabeli

    document.getElementById("results").innerHTML = html;

    // Statystyki

    const unique = new Set(
        data.map(x=>x.levelNormalized)
    ).size;

    updateStats(
        data.length,
        unique,
        data.length - unique
    );
}

/* =====================================================
   FUNKCJA:
   KOPIOWANIE WYNIKU
===================================================== */

function copyResults(){

    // Pobranie wyników

    const results = document.getElementById("results");

    // Jeśli brak wyników

    if(!results.innerText.trim()){

        alert("Brak wyników do skopiowania.");
        return;
    }

    // Kopiowanie do schowka

    navigator.clipboard.writeText(results.innerText)

        .then(() => {

            alert("Wynik skopiowany.");
        })

        .catch(() => {

            alert("Nie udało się skopiować.");
        });
}

</script>

</body>

</html>
